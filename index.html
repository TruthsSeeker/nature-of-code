<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Sketch</title>
  
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
  <div id="p5-root"></div>
  <div id="interface">
    <button id="pause-button">Pause</button>
    <button id="reset-button">Reset</button>
    <label>
      Density
      <input type="range" id="density-slider" min="0" max="1" step="0.01" value="0.1">
    </label>
    
    <label>
      Friction
      <input type="range" id="friction-slider" min="0" max="20" step="0.1" value="1">
    </label>
    
    <label>
      Gravity
      <input type="range" id="gravity-slider" min="0" max="10" step="0.05" value="1">
    </label>
  </div>
  <script type="module" src="src/main.ts"></script>
</body>
</html>
